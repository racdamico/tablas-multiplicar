<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Tablas de Multiplicar</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0c29;
    --card: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.15);
    --accent: #f9c74f;
    --accent2: #f3722c;
    --green: #43e97b;
    --red: #f72585;
    --blue: #4cc9f0;
    --purple: #b5179e;
    --text: #fff;
    --text2: rgba(255,255,255,0.65);
    --radius: 18px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(76,201,240,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(181,23,158,0.15) 0%, transparent 60%);
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }
  .app { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }

  .header { text-align: center; padding: 30px 0 20px; }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 7vw, 3.2rem);
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--red));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.1; margin-bottom: 6px;
  }
  .header p { color: var(--text2); font-size: 1rem; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    backdrop-filter: blur(12px); box-shadow: var(--shadow); margin-bottom: 18px;
  }
  .section-title {
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    color: var(--accent); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  /* TABLA SELECTOR */
  .tabla-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media(min-width:400px) { .tabla-grid { grid-template-columns: repeat(5, 1fr); } }
  .tabla-btn {
    aspect-ratio: 1; border: 2px solid var(--border); border-radius: 14px;
    background: transparent; color: var(--text);
    font-family: 'Fredoka One', cursive; font-size: 1.5rem;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .tabla-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .tabla-btn span { position: relative; z-index: 1; }
  .tabla-btn.active { border-color: var(--accent); }
  .tabla-btn.active::before { opacity: 1; }
  .tabla-btn:hover:not(.active) { border-color: rgba(255,255,255,0.4); transform: scale(1.05); }

  .select-all-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .chip {
    padding: 7px 16px; border-radius: 30px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text2);
    font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* MODO */
  .modos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(min-width:480px) { .modos-grid { grid-template-columns: repeat(3, 1fr); } }
  .modo-btn {
    padding: 14px 10px; border-radius: 14px; border: 2px solid var(--border);
    background: transparent; color: var(--text);
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.3;
  }
  .modo-btn .modo-icon { font-size: 1.6rem; display: block; margin-bottom: 5px; }
  .modo-btn.active { border-color: var(--blue); background: rgba(76,201,240,0.15); }
  .modo-btn:hover:not(.active) { border-color: rgba(255,255,255,0.35); transform: translateY(-2px); }

  /* NUM PREGUNTAS */
  .nq-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .nq-btn {
    padding: 8px 18px; border-radius: 30px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text2);
    font-family: 'Fredoka One', cursive; font-size: 1rem;
    cursor: pointer; transition: all 0.2s;
  }
  .nq-btn.active { border-color: var(--green); color: var(--green); background: rgba(67,233,123,0.1); }
  .nq-btn:hover:not(.active) { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .nq-custom {
    width: 70px; padding: 8px 10px; border-radius: 30px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text);
    font-family: 'Fredoka One', cursive; font-size: 1rem; text-align: center; outline: none;
  }
  .nq-custom:focus { border-color: var(--green); }
  .nq-note { font-size: 0.8rem; color: var(--text2); margin-top: 8px; }

  .play-btn {
    width: 100%; padding: 18px; border-radius: var(--radius); border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #1a0a00; font-family: 'Fredoka One', cursive; font-size: 1.4rem;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(249,199,79,0.35);
  }
  .play-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(249,199,79,0.5); }
  .play-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* GAME */
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .back-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text2); padding: 8px 16px; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem; transition: all 0.2s;
  }
  .back-btn:hover { color: var(--text); }
  .stats-row { display: flex; gap: 10px; align-items: center; }
  .stat-badge {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 12px; font-weight: 800; font-size: 0.9rem;
  }
  .stat-badge.timer { color: var(--accent); }
  .stat-badge.score-s { color: var(--green); }
  .stat-badge.prog { color: var(--blue); }

  .progress-bar-wrap { height: 6px; background: rgba(255,255,255,0.1); border-radius: 30px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); border-radius: 30px; transition: width 0.4s ease; }

  .question-card {
    text-align: center; padding: 36px 24px; margin-bottom: 0;
    position: relative; overflow: hidden;
  }
  .question-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(76,201,240,0.08), rgba(181,23,158,0.08));
    border-radius: var(--radius);
  }
  .modo-label {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--blue); margin-bottom: 14px; position: relative;
  }
  .question-text {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 9vw, 3.8rem);
    line-height: 1; color: var(--text); position: relative;
  }
  .blank {
    color: var(--accent); background: rgba(249,199,79,0.15);
    border-bottom: 3px solid var(--accent); padding: 0 8px; border-radius: 6px;
  }

  .answer-panel { padding-top: 20px; }
  .opciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opcion-btn {
    padding: 18px; border-radius: 14px; border: 2px solid var(--border);
    background: rgba(255,255,255,0.05); color: var(--text);
    font-family: 'Fredoka One', cursive; font-size: 1.8rem;
    cursor: pointer; transition: all 0.18s;
  }
  .opcion-btn:hover:not(:disabled) { border-color: var(--blue); background: rgba(76,201,240,0.12); transform: scale(1.03); }
  .opcion-btn.correct { border-color: var(--green) !important; background: rgba(67,233,123,0.18) !important; color: var(--green); }
  .opcion-btn.wrong { border-color: var(--red) !important; background: rgba(247,37,133,0.18) !important; color: var(--red); }
  .opcion-btn:disabled { cursor: default; }

  .input-row { display: flex; gap: 12px; align-items: center; }
  .answer-input {
    flex: 1; background: rgba(255,255,255,0.08); border: 2px solid var(--border);
    border-radius: 14px; color: var(--text);
    font-family: 'Fredoka One', cursive; font-size: 2rem;
    padding: 16px 20px; text-align: center; outline: none; transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--blue); }
  .answer-input.correct { border-color: var(--green); background: rgba(67,233,123,0.12); }
  .answer-input.wrong { border-color: var(--red); background: rgba(247,37,133,0.12); }
  .check-btn {
    padding: 16px 24px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: white; font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    cursor: pointer; transition: all 0.2s;
  }
  .check-btn:hover { transform: scale(1.05); }

  .tf-row { display: flex; gap: 14px; }
  .tf-btn {
    flex: 1; padding: 20px; border-radius: 14px; border: 2px solid var(--border);
    background: transparent; font-family: 'Fredoka One', cursive; font-size: 1.3rem;
    cursor: pointer; transition: all 0.2s; color: var(--text);
  }
  .tf-btn.verdadero:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
  .tf-btn.falso:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
  .tf-btn.correct { border-color: var(--green) !important; background: rgba(67,233,123,0.18) !important; color: var(--green) !important; }
  .tf-btn.wrong { border-color: var(--red) !important; background: rgba(247,37,133,0.18) !important; color: var(--red) !important; }
  .tf-btn:disabled { cursor: default; }

  .feedback {
    text-align: center; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    padding: 12px; border-radius: 12px; margin-top: 14px; animation: popIn 0.25s ease;
  }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .feedback.correct { color: var(--green); background: rgba(67,233,123,0.1); }
  .feedback.feedback-wrong { color: var(--red); background: rgba(247,37,133,0.1); }

  .next-btn {
    width: 100%; padding: 15px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--green), #00c6c6);
    color: #001a1a; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    cursor: pointer; transition: all 0.2s; margin-top: 14px;
  }
  .next-btn:hover { transform: translateY(-2px); }

  /* RULETA */
  .ruleta-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px 0 20px; }
  .ruleta-num {
    font-family: 'Fredoka One', cursive; font-size: 7rem;
    color: var(--accent); text-shadow: 0 0 40px rgba(249,199,79,0.5); line-height: 1;
  }
  .ruleta-num.spinning { animation: rulspin 0.1s linear infinite; }
  @keyframes rulspin { 0%,100%{transform:scale(1)}50%{transform:scale(1.12)} }
  .spin-btn {
    padding: 14px 32px; border-radius: 40px; border: none;
    background: linear-gradient(135deg, var(--purple), var(--red));
    color: white; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(181,23,158,0.4);
  }
  .spin-btn:hover:not(:disabled) { transform: scale(1.05); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .tabla-completa { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .tabla-fila {
    background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 10px; text-align: center; font-weight: 800; font-size: 0.95rem;
    animation: fadeIn 0.3s ease both; animation-delay: calc(var(--i) * 0.04s);
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .ruleta-action-btn {
    width: 100%; padding: 15px; border-radius: 14px; border: none;
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    cursor: pointer; transition: all 0.2s; margin-top: 10px;
  }
  .ruleta-action-btn.otra { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #1a0a00; }
  .ruleta-action-btn.fin { background: linear-gradient(135deg, var(--purple), var(--blue)); color: white; }
  .ruleta-action-btn:hover { transform: translateY(-2px); }

  /* RESULTS */
  .results-card { text-align: center; padding: 36px 24px; }
  .big-score { font-family: 'Fredoka One', cursive; font-size: 5rem; line-height: 1; margin-bottom: 8px; }
  .score-msg { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; }
  .results-bars { margin: 20px 0; text-align: left; }
  .result-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .result-label { width: 120px; font-weight: 700; font-size: 0.9rem; color: var(--text2); }
  .result-bar-wrap { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 30px; overflow: hidden; }
  .result-bar { height: 100%; border-radius: 30px; transition: width 1s ease; }
  .result-bar.correct { background: linear-gradient(90deg, var(--green), #00c6c6); }
  .result-bar.wrong { background: linear-gradient(90deg, var(--red), var(--purple)); }
  .result-count { width: 32px; font-weight: 800; font-size: 0.9rem; text-align: right; }
  .replay-btn {
    padding: 16px 32px; border-radius: var(--radius); border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a0a00; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    cursor: pointer; margin: 6px; transition: all 0.2s;
  }
  .replay-btn:hover { transform: scale(1.05); }
  .replay-btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }

  .confetti-piece {
    position: fixed; border-radius: 2px; pointer-events: none; z-index: 9999;
    animation: confettiFall var(--dur, 3s) linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .d-none { display: none !important; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="app">

  <!-- ===== HOME ===== -->
  <div id="homeScreen">
    <div class="header">
      <h1>🌟 Tablas de Multiplicar</h1>
      <p>¡A por todas las tablas, campeón!</p>
    </div>

    <div class="card">
      <div class="section-title">📋 Elige las tablas</div>
      <div class="select-all-row">
        <button class="chip" onclick="selectAll()">Todas</button>
        <button class="chip" onclick="selectNone()">Ninguna</button>
      </div>
      <div class="tabla-grid" id="tablaGrid"></div>
    </div>

    <div class="card">
      <div class="section-title">🎮 Elige el modo</div>
      <div class="modos-grid">
        <button class="modo-btn active" data-modo="adivina" onclick="selectModo(this)">
          <span class="modo-icon">🔢</span>Adivina el resultado
        </button>
        <button class="modo-btn" data-modo="factor" onclick="selectModo(this)">
          <span class="modo-icon">❓</span>¿Qué número falta?
        </button>
        <button class="modo-btn" data-modo="escribe" onclick="selectModo(this)">
          <span class="modo-icon">✏️</span>Escribe la respuesta
        </button>
        <button class="modo-btn" data-modo="verdadero" onclick="selectModo(this)">
          <span class="modo-icon">✅</span>Verdadero o Falso
        </button>
        <button class="modo-btn" data-modo="carrera" onclick="selectModo(this)">
          <span class="modo-icon">⏱️</span>Carrera 60 seg.
        </button>
        <button class="modo-btn" data-modo="ruleta" onclick="selectModo(this)">
          <span class="modo-icon">🎯</span>Ruleta de tablas
        </button>
      </div>
    </div>

    <div class="card" id="numPreguntasCard">
      <div class="section-title">🔢 ¿Cuántas preguntas?</div>
      <div class="nq-row">
        <button class="nq-btn active" data-n="5" onclick="selectNQ(this)">5</button>
        <button class="nq-btn" data-n="10" onclick="selectNQ(this)">10</button>
        <button class="nq-btn" data-n="15" onclick="selectNQ(this)">15</button>
        <button class="nq-btn" data-n="20" onclick="selectNQ(this)">20</button>
        <input type="number" class="nq-custom" id="nqCustom" min="1" max="50" placeholder="…" oninput="customNQ(this)">
      </div>
      <div class="nq-note">Máximo 50 preguntas</div>
    </div>

    <button class="play-btn" id="playBtn" onclick="startGame()">¡JUGAR! 🚀</button>
  </div>

  <!-- ===== GAME ===== -->
  <div id="gameScreen" class="d-none">
    <div class="game-header">
      <button class="back-btn" onclick="goHome()">← Menú</button>
      <div class="stats-row">
        <div class="stat-badge timer d-none" id="timerBadge">⏱️ <span id="timerDisplay">60</span>s</div>
        <div class="stat-badge score-s">✅ <span id="scoreDisplay">0</span></div>
        <div class="stat-badge prog" id="progressBadge">📊 <span id="progressDisplay">0/5</span></div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div>
    </div>

    <!-- RULETA PANEL -->
    <div id="roulettePanel" class="d-none">
      <div class="card">
        <div class="section-title">🎯 Ruleta de tablas</div>
        <div class="ruleta-wrap">
          <div style="color:var(--text2);font-weight:700;font-size:0.95rem;">Tabla del...</div>
          <div class="ruleta-num" id="ruletaNum">?</div>
          <button class="spin-btn" id="spinBtn" onclick="spinRuleta()">🎲 ¡Girar!</button>
        </div>
        <div class="tabla-completa d-none" id="tablaCompleta"></div>
        <button class="ruleta-action-btn otra d-none" id="ruletaOtraBtn" onclick="resetRuleta()">🔄 Otra tabla</button>
        <button class="ruleta-action-btn fin d-none" id="ruletaFinBtn" onclick="goHome()">🏠 Terminar</button>
      </div>
    </div>

    <!-- QUESTION PANEL -->
    <div id="questionPanel" class="d-none">
      <div class="card question-card">
        <div class="modo-label" id="modoLabel"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="card answer-panel">
        <div id="opcionesPanel" class="opciones-grid d-none"></div>
        <div id="inputPanel" class="input-row d-none">
          <input type="number" class="answer-input" id="answerInput" placeholder="?" min="0" max="100" onkeydown="handleKey(event)">
          <button class="check-btn" onclick="checkInput()">✓</button>
        </div>
        <div id="tfPanel" class="tf-row d-none">
          <button class="tf-btn verdadero" id="tfTrue" onclick="checkTF(true)">✅ Verdadero</button>
          <button class="tf-btn falso" id="tfFalse" onclick="checkTF(false)">❌ Falso</button>
        </div>
        <div id="feedbackEl" class="d-none"></div>
        <button class="next-btn d-none" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
      </div>
    </div>
  </div>

  <!-- ===== RESULTS ===== -->
  <div id="resultsScreen" class="d-none">
    <div class="header"><h1>🏆 Resultado</h1></div>
    <div class="card results-card">
      <div class="big-score" id="bigScore"></div>
      <div class="score-msg" id="scoreMsg"></div>
      <div class="results-bars">
        <div class="result-row">
          <div class="result-label">✅ Correctas</div>
          <div class="result-bar-wrap"><div class="result-bar correct" id="correctBar" style="width:0%"></div></div>
          <div class="result-count" id="correctCount">0</div>
        </div>
        <div class="result-row">
          <div class="result-label">❌ Errores</div>
          <div class="result-bar-wrap"><div class="result-bar wrong" id="wrongBar" style="width:0%"></div></div>
          <div class="result-count" id="wrongCount">0</div>
        </div>
      </div>
      <div id="wrongList"></div>
      <br>
      <button class="replay-btn" onclick="startGame()">🔄 Otra vez</button>
      <button class="replay-btn secondary" onclick="goHome()">🏠 Menú</button>
    </div>
  </div>

</div>

<script>
// STARS
const starsEl = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div'); s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;`;
  starsEl.appendChild(s);
}

// STATE
let selectedTablas=[1,2,3,4,5,6,7,8,9];
let selectedModo='adivina';
let numPreguntas=5;
let currentQ=null;
let score=0,errors=0,qNum=0;
let timerInterval=null,timerLeft=60;
let wrongAnswers=[];
let answered=false;
let ruletaSeen=[];

// TABLA GRID
const tablaGrid=document.getElementById('tablaGrid');
for(let i=1;i<=9;i++){
  const b=document.createElement('button'); b.className='tabla-btn active';
  b.innerHTML=`<span>${i}</span>`; b.dataset.num=i;
  b.onclick=()=>toggleTabla(i,b);
  tablaGrid.appendChild(b);
}
function toggleTabla(n,btn){
  const idx=selectedTablas.indexOf(n);
  if(idx>=0){selectedTablas.splice(idx,1);btn.classList.remove('active');}
  else{selectedTablas.push(n);btn.classList.add('active');}
  updatePlayBtn();
}
function selectAll(){ selectedTablas=[1,2,3,4,5,6,7,8,9]; document.querySelectorAll('.tabla-btn').forEach(b=>b.classList.add('active')); updatePlayBtn(); }
function selectNone(){ selectedTablas=[]; document.querySelectorAll('.tabla-btn').forEach(b=>b.classList.remove('active')); updatePlayBtn(); }
function updatePlayBtn(){ document.getElementById('playBtn').disabled=selectedTablas.length===0; }

// MODO
function selectModo(btn){
  document.querySelectorAll('.modo-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedModo=btn.dataset.modo;
  const hideNQ=selectedModo==='carrera'||selectedModo==='ruleta';
  document.getElementById('numPreguntasCard').style.display=hideNQ?'none':'block';
}

// NUM PREGUNTAS
function selectNQ(btn){
  document.querySelectorAll('.nq-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  numPreguntas=parseInt(btn.dataset.n);
  document.getElementById('nqCustom').value='';
}
function customNQ(inp){
  let v=parseInt(inp.value);
  if(isNaN(v)||v<1) return;
  if(v>50){v=50;inp.value=50;}
  numPreguntas=v;
  document.querySelectorAll('.nq-btn').forEach(b=>b.classList.remove('active'));
}

// HELPERS
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function randTabla(){return selectedTablas[Math.floor(Math.random()*selectedTablas.length)];}
function G(id){return document.getElementById(id);}
function show(id,d='block'){const e=G(id);e.classList.remove('d-none');if(d==='grid')e.style.display='grid';else if(d==='flex')e.style.display='flex';}
function hide(id){G(id).classList.add('d-none');}

// GENERATE QUESTION
function generateQ(){
  // a es siempre de las tablas seleccionadas, b es 1-10
  const a=randTabla();
  const b=rnd(1,10);
  const res=a*b;

  if(selectedModo==='adivina'||selectedModo==='carrera'){
    return {type:'choice', qText:`${a} × ${b} = ?`, answer:res, opts:buildOpts(res,1,90)};
  }
  if(selectedModo==='escribe'){
    return {type:'input', qText:`${a} × ${b} = ?`, answer:res};
  }
  if(selectedModo==='factor'){
    // ocultar a o b aleatoriamente
    const ocultarA=Math.random()<0.5;
    const qText=ocultarA?`? × ${b} = ${res}`:`${a} × ? = ${res}`;
    const correct=ocultarA?a:b;
    return {type:'choice', qText, answer:correct, opts:buildOpts(correct,1,10)};
  }
  if(selectedModo==='verdadero'){
    const isTrue=Math.random()<0.55;
    let shown=res;
    if(!isTrue){
      const deltas=[-3,-2,-1,1,2,3];
      let tries=0;
      do{ shown=res+deltas[Math.floor(Math.random()*deltas.length)]; tries++; }
      while((shown<=0||shown===res)&&tries<20);
    }
    return {type:'tf', qText:`${a} × ${b} = ${shown}`, answer:isTrue, realAnswer:res};
  }
}

function buildOpts(correct,min,max){
  const s=new Set([correct]);
  let tries=0;
  while(s.size<4&&tries<300){
    tries++;
    const d=rnd(1,4)*(Math.random()<0.5?1:-1);
    const f=correct+d;
    if(f>=min&&f<=max&&f!==correct) s.add(f);
  }
  // rellenar si falta
  while(s.size<4){
    const f=rnd(Math.max(min,correct-6),Math.min(max,correct+6));
    if(!s.has(f)) s.add(f);
  }
  return [...s].sort(()=>Math.random()-0.5);
}

// START GAME
function startGame(){
  if(selectedTablas.length===0) return;
  score=0;errors=0;qNum=0;wrongAnswers=[];answered=false;ruletaSeen=[];
  G('scoreDisplay').textContent='0';
  G('progressBarFill').style.width='0%';

  hide('homeScreen'); hide('resultsScreen'); show('gameScreen');

  if(selectedModo==='ruleta'){
    hide('timerBadge'); hide('progressBadge');
    show('roulettePanel'); hide('questionPanel');
    resetRuleta();
  } else if(selectedModo==='carrera'){
    show('timerBadge','flex'); hide('progressBadge');
    hide('roulettePanel'); show('questionPanel');
    timerLeft=60; G('timerDisplay').textContent=60;
    startTimer();
    nextQuestion();
  } else {
    hide('timerBadge'); show('progressBadge');
    hide('roulettePanel'); show('questionPanel');
    updateProgress();
    nextQuestion();
  }
}

// TIMER
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerLeft--;
    G('timerDisplay').textContent=timerLeft;
    if(timerLeft<=0){clearInterval(timerInterval);showResults();}
  },1000);
}

// RULETA
function resetRuleta(){
  G('ruletaNum').textContent='?';
  G('ruletaNum').classList.remove('spinning');
  G('spinBtn').disabled=false;
  G('tablaCompleta').innerHTML='';
  hide('tablaCompleta'); hide('ruletaOtraBtn'); hide('ruletaFinBtn');
}

function spinRuleta(){
  if(selectedTablas.length===0) return;
  G('spinBtn').disabled=true;
  hide('tablaCompleta'); hide('ruletaOtraBtn'); hide('ruletaFinBtn');

  const numEl=G('ruletaNum');
  numEl.classList.add('spinning');

  // No repetir tabla hasta haber visto todas
  let available=selectedTablas.filter(t=>!ruletaSeen.includes(t));
  if(available.length===0){ruletaSeen=[];available=[...selectedTablas];}
  const finalTabla=available[Math.floor(Math.random()*available.length)];
  ruletaSeen.push(finalTabla);

  let spins=0;
  const iv=setInterval(()=>{
    numEl.textContent=selectedTablas[Math.floor(Math.random()*selectedTablas.length)];
    spins++;
    if(spins>=28){
      clearInterval(iv);
      numEl.classList.remove('spinning');
      numEl.textContent=finalTabla;
      mostrarTabla(finalTabla);
    }
  },70);
}

function mostrarTabla(t){
  const c=G('tablaCompleta');
  c.innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');
    d.className='tabla-fila';
    d.style.setProperty('--i',i);
    d.innerHTML=`${t} × ${i} = <span style="color:var(--green)">${t*i}</span>`;
    c.appendChild(d);
  }
  show('tablaCompleta');
  show('ruletaOtraBtn');
  show('ruletaFinBtn');
}

// QUESTIONS
function nextQuestion(){
  // Fin para modos con límite
  if(selectedModo!=='carrera'&&qNum>=numPreguntas){showResults();return;}

  answered=false;
  currentQ=generateQ();
  qNum++;
  updateProgress();

  // Reset UI
  const fb=G('feedbackEl');
  fb.className='d-none'; fb.textContent='';
  hide('nextBtn');

  // Texto pregunta
  G('questionText').innerHTML=currentQ.qText.replace('?','<span class="blank">?</span>');

  const labels={adivina:'🔢 ELIGE EL RESULTADO',factor:'❓ ¿QUÉ NÚMERO FALTA?',escribe:'✏️ ESCRIBE LA RESPUESTA',verdadero:'¿VERDADERO O FALSO?',carrera:'⏱️ ¡RÁPIDO!'};
  G('modoLabel').textContent=labels[selectedModo]||'';

  hide('opcionesPanel'); hide('inputPanel'); hide('tfPanel');

  if(currentQ.type==='choice'){
    show('opcionesPanel','grid');
    const p=G('opcionesPanel'); p.innerHTML='';
    currentQ.opts.forEach(opt=>{
      const b=document.createElement('button');
      b.className='opcion-btn'; b.textContent=opt;
      b.onclick=()=>checkChoice(opt,b);
      p.appendChild(b);
    });
  } else if(currentQ.type==='input'){
    show('inputPanel','flex');
    const inp=G('answerInput');
    inp.value=''; inp.className='answer-input'; inp.disabled=false;
    setTimeout(()=>inp.focus(),50);
  } else if(currentQ.type==='tf'){
    show('tfPanel','flex');
    ['tfTrue','tfFalse'].forEach(id=>{
      const b=G(id); b.disabled=false;
      b.className='tf-btn '+(id==='tfTrue'?'verdadero':'falso');
    });
  }
}

function checkChoice(val,btn){
  if(answered) return;
  answered=true;
  const ok=val===currentQ.answer;
  register(ok);
  document.querySelectorAll('.opcion-btn').forEach(b=>{
    b.disabled=true;
    // comparar como número para evitar fallos de tipo
    if(Number(b.textContent)===currentQ.answer) b.classList.add('correct');
    else if(b===btn&&!ok) b.classList.add('wrong');
  });
  showFeedback(ok, ok?null:currentQ.answer);
  if(selectedModo==='carrera'){
    setTimeout(()=>{ if(timerLeft>0) nextQuestion(); },800);
  } else { show('nextBtn'); }
}

function checkInput(){
  if(answered) return;
  const val=parseInt(G('answerInput').value);
  if(isNaN(val)) return;
  answered=true;
  G('answerInput').disabled=true;
  const ok=val===currentQ.answer;
  G('answerInput').className='answer-input '+(ok?'correct':'wrong');
  register(ok);
  showFeedback(ok, ok?null:currentQ.answer);
  show('nextBtn');
}

function handleKey(e){ if(e.key==='Enter') checkInput(); }

function checkTF(userAnswer){
  if(answered) return;
  answered=true;
  const ok=userAnswer===currentQ.answer;
  register(ok);
  ['tfTrue','tfFalse'].forEach(id=>{
    const b=G(id); b.disabled=true;
    const isVerd=id==='tfTrue';
    if(isVerd===currentQ.answer) b.classList.add('correct');
    else if(isVerd===userAnswer&&!ok) b.classList.add('wrong');
  });
  showFeedback(ok, ok?null:currentQ.realAnswer);
  show('nextBtn');
}

function register(ok){
  if(ok){ score++; }
  else { errors++; wrongAnswers.push({q:currentQ.qText, a:currentQ.answer??currentQ.realAnswer}); }
  G('scoreDisplay').textContent=score;
}

function showFeedback(ok, rightAnswer){
  const oks=['¡Genial! 🎉','¡Exacto! ⭐','¡Muy bien! 🚀','¡Correcto! 🏆','¡Eres un crack! 💪'];
  const errs=['¡Casi! 😅','¡Sigue intentando! 💪','Uy, error 😬','¡La próxima! 🌟'];
  const fb=G('feedbackEl');
  fb.className='feedback '+(ok?'correct':'feedback-wrong');
  fb.textContent=ok
    ? oks[Math.floor(Math.random()*oks.length)]
    : errs[Math.floor(Math.random()*errs.length)]+(rightAnswer!=null?` La respuesta era ${rightAnswer}`:'');
  if(ok&&score%5===0&&score>0) confetti();
}

function updateProgress(){
  if(selectedModo==='carrera') return;
  G('progressDisplay').textContent=`${qNum}/${numPreguntas}`;
  G('progressBarFill').style.width=`${Math.min((qNum/numPreguntas)*100,100)}%`;
}

// RESULTS
function showResults(){
  clearInterval(timerInterval);
  hide('gameScreen'); hide('homeScreen'); show('resultsScreen');

  const total=score+errors;
  const pct=total>0?Math.round(score/total*100):0;
  G('bigScore').textContent=pct+'%';
  G('bigScore').style.color=pct>=80?'var(--green)':pct>=50?'var(--accent)':'var(--red)';
  G('scoreMsg').textContent=pct>=90?'¡Increíble! Eres un genio 🌟':pct>=70?'¡Muy bien! 🏆':pct>=50?'¡Buen intento! 💪':'¡A seguir practicando! 📚';
  G('correctCount').textContent=score;
  G('wrongCount').textContent=errors;
  setTimeout(()=>{
    G('correctBar').style.width=total>0?(score/total*100)+'%':'0%';
    G('wrongBar').style.width=total>0?(errors/total*100)+'%':'0%';
  },100);

  if(wrongAnswers.length>0){
    let html=`<div style="font-size:0.85rem;font-weight:700;color:var(--text2);margin-bottom:8px;text-align:left;">📚 Repasar estas:</div>`;
    wrongAnswers.forEach(w=>{
      html+=`<div style="background:rgba(247,37,133,0.08);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-weight:700;font-size:0.9rem;text-align:left;">${w.q.replace('?','<span style="color:var(--accent)">?</span>')} → <span style="color:var(--green)">${w.a}</span></div>`;
    });
    G('wrongList').innerHTML=html;
  } else { G('wrongList').innerHTML=''; }
  if(pct>=80) confetti();
}

function goHome(){
  clearInterval(timerInterval);
  show('homeScreen'); hide('gameScreen'); hide('resultsScreen');
}

function confetti(){
  const cols=['#f9c74f','#f3722c','#f72585','#43e97b','#4cc9f0','#b5179e','#fff'];
  for(let i=0;i<55;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};--dur:${2+Math.random()*2}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()<0.5?'50%':'3px'};animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }
}
</script>
